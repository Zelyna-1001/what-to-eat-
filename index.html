<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b7e4c7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="今天吃什么" />
  <title>今天吃什么</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=1" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Meal Randomizer</p>
        <h1>今天吃什么</h1>
      </div>
      <button id="settingsBtn" class="ghost-btn">设置</button>
    </header>

    <section class="status-card">
      <div class="day-toggle" role="tablist" aria-label="日类型">
        <button id="trainingBtn" class="active" data-day="training">训练日</button>
        <button id="restBtn" data-day="rest">休息日</button>
      </div>
      <div class="target-grid">
        <div><span>今日预算</span><strong id="budgetText">¥22</strong></div>
        <div><span>目标热量</span><strong id="calorieTargetText">-- kcal</strong></div>
        <div><span>热量差</span><strong id="deficitText">450 kcal</strong></div>
      </div>
      <p id="profileHint" class="muted small"></p>
    </section>

    <section class="result-card">
      <div class="result-header">
        <div>
          <p class="eyebrow">今日组合</p>
          <h2 id="planTitle">先生成一组</h2>
        </div>
        <button id="generateBtn" class="primary-btn">随机组合</button>
      </div>
      <div id="planSummary" class="plan-summary"></div>
      <div id="mealList" class="meal-list"></div>
      <p id="planNote" class="note"></p>
    </section>

    <section class="food-section">
      <div class="section-header">
        <div>
          <p class="eyebrow">Food Bank</p>
          <h2>食物库</h2>
        </div>
        <div class="mini-actions">
          <button id="backupBtn" class="outline-btn">备份</button>
          <button id="resetDemoBtn" class="outline-btn danger-light">重置示例</button>
        </div>
      </div>
      <div class="filters">
        <select id="foodFilterMeal">
          <option value="all">全部餐次</option>
          <option value="breakfast">早餐</option>
          <option value="lunch">午餐</option>
          <option value="dinner">晚餐</option>
          <option value="snack">加餐</option>
        </select>
        <select id="foodFilterType">
          <option value="all">全部类型</option>
          <option value="protein">蛋白质</option>
          <option value="carb">主食/碳水</option>
          <option value="veg">蔬菜</option>
          <option value="fruit">水果</option>
          <option value="drink">饮品</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div id="foodList" class="food-list"></div>
    </section>
  </div>

  <button id="addFoodBtn" class="fab" aria-label="添加食物">＋</button>

  <dialog id="firstRunDialog" class="sheet-dialog">
    <form id="firstRunForm" class="sheet" novalidate>
      <h2>先设置你的目标</h2>
      <p class="muted">这些数据只存在你的手机浏览器本地，用来粗略估算减脂热量。后面可以随时修改。</p>
      <div class="two-col">
        <label class="field">性别
          <select id="initSex">
            <option value="female" selected>女</option>
            <option value="male">男</option>
          </select>
        </label>
        <label class="field">年龄
          <input id="initAge" type="number" min="10" max="90" value="21" />
        </label>
      </div>
      <div class="two-col">
        <label class="field">身高 cm
          <input id="initHeight" type="number" min="100" max="230" value="165" />
        </label>
        <label class="field">体重 kg
          <input id="initWeight" type="number" min="30" max="200" step="0.1" value="62" />
        </label>
      </div>
      <div class="two-col">
        <label class="field">每日预算 ¥
          <input id="initBudget" type="number" min="0" step="0.1" value="22" />
        </label>
        <label class="field">目标热量差 kcal
          <input id="initDeficit" type="number" min="0" max="1000" step="50" value="450" />
        </label>
      </div>
      <menu class="sheet-actions">
        <button type="submit" class="primary-btn">开始使用</button>
      </menu>
    </form>
  </dialog>

  <dialog id="settingsDialog" class="sheet-dialog">
    <form id="settingsForm" class="sheet" novalidate>
      <div class="sheet-header">
        <h2>设置</h2>
        <button type="button" class="icon-btn" id="closeSettingsBtn">×</button>
      </div>
      <div class="two-col">
        <label class="field">性别
          <select id="sexInput">
            <option value="female">女</option>
            <option value="male">男</option>
          </select>
        </label>
        <label class="field">年龄
          <input id="ageInput" type="number" min="10" max="90" />
        </label>
      </div>
      <div class="two-col">
        <label class="field">身高 cm
          <input id="heightInput" type="number" min="100" max="230" />
        </label>
        <label class="field">体重 kg
          <input id="weightInput" type="number" min="30" max="200" step="0.1" />
        </label>
      </div>
      <div class="two-col">
        <label class="field">每日预算 ¥
          <input id="budgetInput" type="number" min="0" step="0.1" />
        </label>
        <label class="field">目标热量差 kcal
          <input id="deficitInput" type="number" min="0" max="1000" step="50" />
        </label>
      </div>
      <p class="note">训练日和休息日会分别估算热量，再减去你设置的热量差。结果仅作日常记录和饮食规划参考。</p>
      <menu class="sheet-actions">
        <button type="submit" class="primary-btn">保存设置</button>
      </menu>
    </form>
  </dialog>

  <dialog id="foodDialog" class="sheet-dialog">
    <form id="foodForm" class="sheet" novalidate>
      <div class="sheet-header">
        <h2 id="foodDialogTitle">添加食物</h2>
        <button type="button" class="icon-btn" id="closeFoodBtn">×</button>
      </div>
      <input id="editingFoodId" type="hidden" />
      <label class="field">食物名称
        <input id="foodNameInput" placeholder="例如：鸡蛋 / 番茄鸡蛋饭" />
      </label>
      <div class="two-col">
        <label class="field">热量 kcal
          <input id="foodCaloriesInput" type="number" min="0" step="1" placeholder="例如：150" />
        </label>
        <label class="field">价格 ¥
          <input id="foodPriceInput" type="number" min="0" step="0.1" placeholder="例如：3.5" />
        </label>
      </div>
      <div class="two-col">
        <label class="field">蛋白质 g
          <input id="foodProteinInput" type="number" min="0" step="0.1" placeholder="可空" />
        </label>
        <label class="field">碳水 g
          <input id="foodCarbInput" type="number" min="0" step="0.1" placeholder="可空" />
        </label>
      </div>
      <div class="two-col">
        <label class="field">脂肪 g
          <input id="foodFatInput" type="number" min="0" step="0.1" placeholder="可空" />
        </label>
        <label class="field">膳食纤维 g
          <input id="foodFiberInput" type="number" min="0" step="0.1" placeholder="可空" />
        </label>
      </div>
      <label class="field">类型
        <select id="foodTypeInput">
          <option value="protein">蛋白质</option>
          <option value="carb">主食/碳水</option>
          <option value="veg">蔬菜</option>
          <option value="fruit">水果</option>
          <option value="drink">饮品</option>
          <option value="other">其他</option>
        </select>
      </label>
      <fieldset class="meal-checks">
        <legend>适合餐次</legend>
        <label><input type="checkbox" name="mealTags" value="breakfast" /> 早餐</label>
        <label><input type="checkbox" name="mealTags" value="lunch" /> 午餐</label>
        <label><input type="checkbox" name="mealTags" value="dinner" /> 晚餐</label>
        <label><input type="checkbox" name="mealTags" value="snack" /> 加餐</label>
      </fieldset>
      <label class="field">备注
        <textarea id="foodNoteInput" rows="2" placeholder="例如：食堂二楼 / 外卖常点 / 训练后适合"></textarea>
      </label>
      <menu class="sheet-actions">
        <button id="deleteFoodBtn" type="button" class="ghost-btn danger" hidden>删除</button>
        <button type="submit" class="primary-btn">保存</button>
      </menu>
    </form>
  </dialog>

  <dialog id="backupDialog" class="sheet-dialog">
    <section class="sheet compact-sheet">
      <div class="sheet-header">
        <h2>备份与恢复</h2>
        <button type="button" class="icon-btn" id="closeBackupBtn">×</button>
      </div>
      <p class="muted">备份包含设置、食物库和当前生成的组合。导入会覆盖当前数据。</p>
      <div class="backup-actions">
        <button id="exportBtn" type="button" class="primary-btn">导出备份</button>
        <label class="outline-btn import-label">导入备份
          <input id="importInput" type="file" accept="application/json,.json" hidden />
        </label>
      </div>
    </section>
  </dialog>

  <script src="app.js?v=1"></script>
</body>
</html>
